<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Danz Prst — Koleksi preset Alight Motion gratis by danz">
<title>Danz Prst</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js" defer></script>
<style>
:root{
  --accent:#f97316;--accent-h:#ea6f0f;--accent-s:#fb923c;
  --accent-g:linear-gradient(135deg,#f97316,#fb923c);
  --glow:rgba(249,115,22,.18);--glow-s:rgba(249,115,22,.08);
  --red:#f87171;
}
[data-theme="dark"]{
  --bg:#0c0a08;--surf:#13100d;--card:#1a1510;--card2:#201a13;
  --border:#2e2318;--border2:#3d3020;
  --text:#f5ede4;--text2:#c4a882;--muted:#6b5540;--tag-bg:#1e1710;
  --overlay:rgba(0,0,0,.92);--shadow:0 24px 64px rgba(0,0,0,.7);
  --ph-from:#1a1510;--ph-to:#201a13;
}
[data-theme="light"]{
  --bg:#fdf8f3;--surf:#f5ede2;--card:#fff;--card2:#fef9f4;
  --border:#e8d5bc;--border2:#d9c0a0;
  --text:#1a1008;--text2:#6b4a2a;--muted:#a0845c;--tag-bg:#fef0e0;
  --overlay:rgba(0,0,0,.5);--shadow:0 12px 40px rgba(0,0,0,.12);
  --ph-from:#f5ede2;--ph-to:#fef0e0;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;overflow-x:hidden;
  transition:background .3s,color .3s;
  -webkit-font-smoothing:antialiased;
}
img,video{display:block;max-width:100%}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;background:none;font-family:inherit}

/* BG */
.bg-noise{
  position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
.bg-orb{position:fixed;pointer-events:none;z-index:0;border-radius:50%;filter:blur(90px);}
.bg-orb-1{width:600px;height:500px;top:-180px;left:50%;transform:translateX(-50%);background:radial-gradient(ellipse,rgba(249,115,22,.09),transparent 70%);}
.bg-orb-2{width:350px;height:350px;bottom:80px;right:-100px;background:radial-gradient(ellipse,rgba(251,146,60,.06),transparent 70%);}

/* LOADER */
#loader{
  position:fixed;inset:0;z-index:9000;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;
}
.ld-logo{
  font-family:'Syne',sans-serif;font-size:48px;font-weight:800;
  background:var(--accent-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:-.04em;opacity:0;transform:translateY(16px);
}
.ld-track{width:220px;height:3px;background:var(--border);border-radius:99px;overflow:hidden;}
.ld-fill{height:100%;width:0%;background:var(--accent-g);border-radius:99px;}
.ld-sub{font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;opacity:0;}

/* TOPBAR */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:flex-end;
  padding:12px 20px;gap:8px;
  background:linear-gradient(var(--bg),transparent);
  pointer-events:none;
}
.topbar>*{pointer-events:all;}
.icon-btn{
  width:36px;height:36px;border-radius:10px;
  background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);transition:all .2s;
}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);box-shadow:0 0 14px var(--glow);}
.icon-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* HEADER */
header{position:relative;z-index:10;padding:72px 24px 0;text-align:center;}
.badge{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--card);border:1px solid var(--border);
  border-radius:99px;padding:6px 16px 6px 8px;margin-bottom:24px;
}
.badge-dot{
  width:24px;height:24px;border-radius:50%;background:var(--accent-g);
  display:flex;align-items:center;justify-content:center;
}
.badge-dot svg{width:12px;height:12px;stroke:white;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.badge-text{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
h1{font-family:'Syne',sans-serif;font-size:clamp(48px,8.5vw,92px);font-weight:800;line-height:.92;letter-spacing:-.04em;}
.grad{background:var(--accent-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tagline{color:var(--muted);font-size:13px;margin-top:14px;letter-spacing:.04em;}
.stats{
  display:inline-flex;align-items:center;gap:24px;
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:14px 24px;margin-top:24px;
}
.stat{text-align:center;}
.stat-n{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;background:var(--accent-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:1px;}
.sdiv{width:1px;height:26px;background:var(--border);}

/* CONTROLS */
.controls{position:relative;z-index:10;max-width:860px;margin:32px auto 0;padding:0 20px;display:flex;flex-direction:column;gap:12px;}
.search-box{position:relative;}
.search-box input{
  width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:12px 16px 12px 42px;
  color:var(--text);font-family:'Inter',sans-serif;font-size:13px;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow-s);}
.search-box input::placeholder{color:var(--muted);}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.search-ico svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.cats{display:flex;gap:7px;flex-wrap:wrap;}
.cat{
  display:flex;align-items:center;gap:6px;
  background:var(--card);border:1px solid var(--border);
  border-radius:9px;padding:7px 14px;
  font-size:11px;font-weight:500;color:var(--muted);
  transition:all .2s;text-transform:uppercase;letter-spacing:.07em;
}
.cat svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.cat:hover{border-color:var(--accent);color:var(--accent);}
.cat.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 16px var(--glow);}
.cat.on svg{stroke:#fff;}
.cat-n{background:rgba(255,255,255,.2);border-radius:20px;padding:1px 6px;font-size:10px;}
.cat:not(.on) .cat-n{background:var(--border);color:var(--muted);}

/* WRAP */
.wrap{position:relative;z-index:10;max-width:1080px;margin:32px auto 0;padding:0 20px 90px;contain:layout style;}
.sec-lbl{font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:10px;}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;contain:layout;}

/* CARD */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;
  transition:border-color .25s,box-shadow .25s;
  position:relative;contain:layout style paint;will-change:transform;
}
.card:hover{border-color:var(--accent);box-shadow:0 16px 48px rgba(249,115,22,.1);}

/* ── MEDIA SECTION — always shown ── */
.thumb{
  position:relative;width:100%;padding-top:56.25%;
  background:var(--surf);overflow:hidden;cursor:pointer;
}

/* Placeholder — shown when no media or before load */
.thumb-ph{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  background:linear-gradient(135deg,var(--ph-from),var(--ph-to));
  transition:opacity .3s;z-index:2;
}
.thumb-ph.hidden{opacity:0;pointer-events:none;}

.ph-icon{
  width:52px;height:52px;border-radius:14px;
  background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.2);
  display:flex;align-items:center;justify-content:center;
  transition:transform .25s,background .25s;
}
.ph-icon svg{width:22px;height:22px;stroke:var(--accent);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.ph-texts{text-align:center;}
.ph-main{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.02em;}
.ph-sub{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:.04em;}

/* pulse ring on icon */
.ph-icon::after{
  content:'';position:absolute;
  width:52px;height:52px;border-radius:14px;
  border:2px solid rgba(249,115,22,.3);
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.15);opacity:0}}

/* shimmer for loading state */
.shimmer{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  background:linear-gradient(90deg,transparent 0%,rgba(249,115,22,.05) 50%,transparent 100%);
  background-size:200% 100%;animation:sh 1.6s infinite;
}
@keyframes sh{0%{background-position:-200% 0}100%{background-position:200% 0}}
.shimmer.gone{display:none;}

/* actual image/video */
.thumb img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;opacity:0;transition:opacity .4s;z-index:3;
}
.thumb img.vis{opacity:1;}

/* hover overlay — expand hint */
.thumb-ov{
  position:absolute;inset:0;z-index:5;
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:14px;
  background:linear-gradient(transparent 40%,rgba(0,0,0,.55) 100%);
  opacity:0;transition:opacity .22s;
}
.thumb:hover .thumb-ov{opacity:1;}
.thumb:hover .ph-icon{transform:scale(1.08);background:rgba(249,115,22,.2);}

.expand-chip{
  display:flex;align-items:center;gap:7px;
  background:rgba(249,115,22,.92);backdrop-filter:blur(8px);
  border-radius:99px;padding:7px 16px;
  color:#fff;font-size:11px;font-weight:600;letter-spacing:.05em;
  box-shadow:0 4px 16px rgba(249,115,22,.4);
}
.expand-chip svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}

/* no-media state: chip always visible */
.thumb.no-media .thumb-ov{
  opacity:1;
  background:transparent;
  align-items:center;padding-bottom:0;
}
.thumb.no-media .expand-chip{
  background:rgba(249,115,22,.15);
  border:1px solid rgba(249,115,22,.3);
  color:var(--accent);
  box-shadow:none;
}

/* cat badge */
.cat-badge{
  position:absolute;top:9px;left:9px;z-index:6;
  display:flex;align-items:center;gap:5px;
  background:rgba(0,0,0,.55);backdrop-filter:blur(8px);
  border:1px solid rgba(249,115,22,.28);border-radius:7px;
  padding:3px 9px;font-size:10px;color:var(--accent-s);
  text-transform:uppercase;letter-spacing:.07em;font-weight:500;
}
.cat-badge svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* CARD BODY */
.cbody{padding:16px;}
.cname{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);margin-bottom:3px;}
.cdate{font-size:10px;color:var(--muted);margin-bottom:10px;}
.cdesc{font-size:11px;color:var(--text2);line-height:1.6;margin-bottom:12px;min-height:32px;}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:13px;}
.tag{background:var(--tag-bg);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:10px;color:var(--accent);letter-spacing:.06em;text-transform:uppercase;}
.btns{display:flex;gap:7px;}
.dl-btn{
  flex:1;border-radius:9px;padding:9px 10px;
  font-size:11px;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all .2s;letter-spacing:.04em;
}
.dl-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.dl-xml{background:var(--accent-g);color:#fff;}
.dl-xml:hover{filter:brightness(1.1);transform:scale(1.02);}
.dl-5mb{background:var(--surf);border:1px solid var(--border);color:var(--text2);}
.dl-5mb:hover{border-color:var(--accent);color:var(--accent);}
.dl-dis{opacity:.3;pointer-events:none;cursor:default;}

/* EMPTY */
.empty{display:none;text-align:center;padding:72px 24px;color:var(--muted);}
.empty svg{width:44px;height:44px;stroke:var(--border2);fill:none;stroke-width:1.5;margin:0 auto 14px;}
.empty p{font-size:13px;line-height:1.7;}

/* LIGHTBOX */
#lb{
  position:fixed;inset:0;z-index:800;
  background:rgba(0,0,0,.96);backdrop-filter:blur(18px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;opacity:0;pointer-events:none;transition:opacity .25s;
}
#lb.on{opacity:1;pointer-events:all;}
.lb-wrap{
  position:relative;width:100%;max-width:880px;
  background:#000;border-radius:14px;overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.85);
  transform:scale(.94);transition:transform .28s cubic-bezier(.34,1.3,.64,1);
}
#lb.on .lb-wrap{transform:scale(1);}
#lb-video{width:100%;max-height:72vh;background:#000;display:none;}
#lb-img{width:100%;max-height:72vh;object-fit:contain;display:none;}

/* no-media lightbox */
.lb-nomedia{
  display:none;
  flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:60px 32px;background:var(--card);
  color:var(--muted);text-align:center;
}
.lb-nomedia svg{width:40px;height:40px;stroke:var(--border2);fill:none;stroke-width:1.5;}
.lb-nomedia p{font-size:12px;line-height:1.7;}
.lb-nomedia a{
  display:inline-flex;align-items:center;gap:6px;margin-top:4px;
  background:var(--accent-g);color:#fff;
  border-radius:9px;padding:9px 18px;font-size:12px;font-weight:600;
}

.lb-bar{width:100%;max-width:880px;display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding:0 2px;}
.lb-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:#fff;}
.lb-close{
  width:36px;height:36px;border-radius:9px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  color:#fff;transition:all .2s;flex-shrink:0;
}
.lb-close:hover{background:rgba(248,113,113,.2);border-color:rgba(248,113,113,.4);color:var(--red);}
.lb-close svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}

/* TOAST */
.toast{
  position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:11px 18px;font-size:12px;z-index:999;
  opacity:0;transition:all .28s;white-space:nowrap;
  box-shadow:var(--shadow);display:flex;align-items:center;gap:7px;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(--accent);color:var(--accent);}
.toast.err{border-color:var(--red);color:var(--red);}
.toast svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}

footer{position:relative;z-index:10;text-align:center;padding:0 24px 44px;color:var(--muted);font-size:11px;letter-spacing:.06em;}
footer span{color:var(--accent);}

@media(max-width:480px){
  .stats{gap:16px;padding:12px 18px;}.stat-n{font-size:19px;}
  .grid{grid-template-columns:1fr;}
  .cats{gap:5px;}.cat{padding:6px 10px;font-size:10px;}
}
</style>
</head>
<body>

<div class="bg-noise"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<!-- LOADER -->
<div id="loader">
  <div class="ld-logo">danz prst</div>
  <div class="ld-track"><div class="ld-fill" id="ld-fill"></div></div>
  <div class="ld-sub">memuat preset...</div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <button class="icon-btn" id="theme-btn" title="Toggle tema">
    <svg id="ico-d" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg id="ico-l" viewBox="0 0 24 24" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</div>

<header id="hdr">
  <div class="badge">
    <div class="badge-dot">
      <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    </div>
    <span class="badge-text">Alight Motion</span>
  </div>
  <h1>Danz<br><span class="grad">Prst</span></h1>
  <p class="tagline">Koleksi preset Alight Motion gratis by danz</p>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="cnt-total">—</div><div class="stat-l">Preset</div></div>
    <div class="sdiv"></div>
    <div class="stat"><div class="stat-n">4</div><div class="stat-l">Kategori</div></div>
    <div class="sdiv"></div>
    <div class="stat"><div class="stat-n">Free</div><div class="stat-l">Semua</div></div>
  </div>
</header>

<div class="controls" id="ctrls">
  <div class="search-box">
    <span class="search-ico"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
    <input type="text" id="q" placeholder="cari preset..." autocomplete="off" spellcheck="false">
  </div>
  <div class="cats" id="cats">
    <button class="cat on" data-c="all">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Semua <span class="cat-n" id="n-all">0</span>
    </button>
    <button class="cat" data-c="preset">
      <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Preset <span class="cat-n" id="n-preset">0</span>
    </button>
    <button class="cat" data-c="jj">
      <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>
      JJ <span class="cat-n" id="n-jj">0</span>
    </button>
    <button class="cat" data-c="typography">
      <svg viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
      Typography <span class="cat-n" id="n-typography">0</span>
    </button>
    <button class="cat" data-c="gfx">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      GFX <span class="cat-n" id="n-gfx">0</span>
    </button>
  </div>
</div>

<div class="wrap" id="wrap">
  <div class="sec-lbl" id="sec-lbl">Semua Preset</div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <p>Belum ada preset ditemukan.</p>
  </div>
</div>

<footer>made by <span>danz</span> · danz prst © 2025</footer>

<!-- LIGHTBOX -->
<div id="lb">
  <div class="lb-wrap" id="lb-wrap">
    <video id="lb-video" controls autoplay playsinline></video>
    <img id="lb-img" alt="preview">
    <div class="lb-nomedia" id="lb-nomedia">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <p>Preview belum tersedia untuk preset ini.<br>Download langsung dan coba di Alight Motion!</p>
    </div>
  </div>
  <div class="lb-bar">
    <div class="lb-title" id="lb-title"></div>
    <button class="lb-close" id="lb-close">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, collection, getDocs, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const FB = {
  apiKey:"AIzaSyCh_B8QG02Z5DjagQTH-rCzJg5k3p3uuUc",
  authDomain:"danz-prst.firebaseapp.com",
  projectId:"danz-prst",
  storageBucket:"danz-prst.firebasestorage.app",
  messagingSenderId:"745792071798",
  appId:"1:745792071798:web:bf606ff7671ef68d51d757"
};

const db = getFirestore(initializeApp(FB));

/* ── LOADER ── */
const fill = document.getElementById('ld-fill');
let prog = 0;
const pi = setInterval(() => {
  prog = Math.min(prog + Math.random() * 12, 88);
  fill.style.width = prog + '%';
}, 120);

function doneLoader() {
  clearInterval(pi);
  fill.style.width = '100%';
  setTimeout(() => {
    const ld = document.getElementById('loader');
    anime({ targets: ld, opacity: 0, duration: 400, easing: 'easeOutQuad',
      complete: () => { ld.style.display = 'none'; pageIn(); }
    });
  }, 300);
}

function pageIn() {
  anime({ targets: '#hdr', opacity: [0,1], translateY: [-18,0], duration: 600, easing: 'easeOutExpo' });
  anime({ targets: '#ctrls', opacity: [0,1], translateY: [-14,0], duration: 600, delay: 120, easing: 'easeOutExpo' });
  anime({ targets: '#wrap', opacity: [0,1], duration: 500, delay: 220, easing: 'easeOutQuad' });
}

/* ── THEME ── */
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('dp-theme', t);
  document.getElementById('ico-d').style.display = t === 'dark' ? 'block' : 'none';
  document.getElementById('ico-l').style.display = t === 'light' ? 'block' : 'none';
}
applyTheme(localStorage.getItem('dp-theme') || 'dark');
document.getElementById('theme-btn').addEventListener('click', () =>
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark')
);

/* ── TOAST ── */
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>${msg}`;
  el.className = 'toast show ' + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

/* ── STATE ── */
let presets = [], activeCat = 'all';
const CAT_LBL = { all:'Semua', preset:'Preset', jj:'JJ', typography:'Typography', gfx:'GFX' };
const isVideoType = c => ['preset','jj','typography'].includes(c);

/* ── LAZY IMG OBS ── */
const obs = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (!e.isIntersecting) return;
    const img = e.target;
    if (!img.dataset.src) return;
    img.src = img.dataset.src;
    img.onload = () => {
      img.classList.add('vis');
      img.closest('.thumb')?.querySelector('.shimmer')?.classList.add('gone');
      img.closest('.thumb')?.querySelector('.thumb-ph')?.classList.add('hidden');
    };
    img.onerror = () => { /* keep placeholder */ };
    obs.unobserve(img);
  });
}, { rootMargin: '300px' });

/* ── LIGHTBOX ── */
const lb        = document.getElementById('lb');
const lbVideo   = document.getElementById('lb-video');
const lbImg     = document.getElementById('lb-img');
const lbNomedia = document.getElementById('lb-nomedia');
const lbTitle   = document.getElementById('lb-title');

function openLB(p) {
  lbTitle.textContent = p.name;
  lbVideo.style.display = 'none';
  lbImg.style.display   = 'none';
  lbNomedia.style.display = 'none';

  if (p.media) {
    if (isVideoType(p.category)) {
      lbVideo.style.display = 'block';
      lbVideo.src = p.media; lbVideo.load();
    } else {
      lbImg.style.display = 'block';
      lbImg.src = p.media;
    }
  } else {
    lbNomedia.style.display = 'flex';
  }

  lb.classList.add('on');
  document.body.style.overflow = 'hidden';
}
function closeLB() {
  lb.classList.remove('on');
  lbVideo.pause(); lbVideo.src = ''; lbImg.src = '';
  document.body.style.overflow = '';
}
document.getElementById('lb-close').addEventListener('click', closeLB);
lb.addEventListener('click', e => { if (e.target === lb) closeLB(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLB(); });

/* ── COUNTS ── */
function setCounts() {
  document.getElementById('cnt-total').textContent = presets.length;
  ['all','preset','jj','typography','gfx'].forEach(c => {
    const el = document.getElementById('n-' + c);
    if (el) el.textContent = c === 'all' ? presets.length : presets.filter(p => p.category === c).length;
  });
}

/* ── RENDER ── */
function getList() {
  const q = document.getElementById('q').value.toLowerCase().trim();
  return presets.filter(p => {
    const mc = activeCat === 'all' || p.category === activeCat;
    const mq = !q || p.name.toLowerCase().includes(q) ||
      (p.desc||'').toLowerCase().includes(q) ||
      (p.tags||[]).some(t => t.toLowerCase().includes(q));
    return mc && mq;
  });
}

function fmtDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
}

const CAT_SVG = {
  preset:'<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
  jj:'<rect x="2" y="2" width="20" height="20" rx="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/>',
  typography:'<polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/>',
  gfx:'<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>'
};

// SVG icons inline
const DL_ICO = '<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
const EX_ICO_VIDEO = '<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
const EX_ICO_IMG   = '<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>';
const EX_ICO_NONE  = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
const EXPAND_ICO   = '<svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>';

function render() {
  const list = getList();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  document.getElementById('sec-lbl').textContent = CAT_LBL[activeCat] || 'Semua';
  grid.innerHTML = '';

  if (!list.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  const frag = document.createDocumentFragment();
  list.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.opacity = '0';
    card.style.transform = 'translateY(18px)';

    const hasMedia = !!p.media;
    const isVid = isVideoType(p.category);
    const catKey = p.category || 'preset';
    const tags = (p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');

    // Determine placeholder icon & text
    let phIco, phMain, phSub, expandTxt, expandIco;
    if (hasMedia) {
      if (isVid) {
        phIco = EX_ICO_VIDEO;
        phMain = 'Klik untuk lihat preview';
        phSub = 'Video · dengan suara';
        expandTxt = 'Tonton Preview';
      } else {
        phIco = EX_ICO_IMG;
        phMain = 'Klik untuk lihat preview';
        phSub = 'Gambar GFX';
        expandTxt = 'Lihat Penuh';
      }
      expandIco = EXPAND_ICO;
    } else {
      phIco = EX_ICO_NONE;
      phMain = 'Klik untuk info preset';
      phSub = 'Preview belum tersedia';
      expandTxt = 'Info Preset';
      expandIco = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
    }

    const xmlB = p.xml
      ? `<a class="dl-btn dl-xml" href="${p.xml}" target="_blank" rel="noopener">${DL_ICO} XML</a>`
      : `<span class="dl-btn dl-xml dl-dis">${DL_ICO} XML</span>`;
    const mbB = p.mb5
      ? `<a class="dl-btn dl-5mb" href="${p.mb5}" target="_blank" rel="noopener">${DL_ICO} 5MB</a>`
      : `<span class="dl-btn dl-5mb dl-dis">${DL_ICO} 5MB</span>`;

    card.innerHTML = `
      <div class="thumb${!hasMedia?' no-media':''}">
        <div class="shimmer${hasMedia?'':' gone'}"></div>
        <div class="thumb-ph">
          <div class="ph-icon">${phIco}</div>
          <div class="ph-texts">
            <div class="ph-main">${phMain}</div>
            <div class="ph-sub">${phSub}</div>
          </div>
        </div>
        ${hasMedia ? `<img data-src="${p.media}" alt="${p.name}" loading="lazy">` : ''}
        <div class="thumb-ov">
          <div class="expand-chip">${expandIco} ${expandTxt}</div>
        </div>
        <div class="cat-badge"><svg viewBox="0 0 24 24">${CAT_SVG[catKey]||CAT_SVG.preset}</svg> ${CAT_LBL[catKey]||'Preset'}</div>
      </div>
      <div class="cbody">
        <div class="cname">${p.name}</div>
        <div class="cdate">${fmtDate(p.createdAt)}</div>
        <div class="cdesc">${p.desc||'Preset Alight Motion by danz.'}</div>
        <div class="tags">${tags}</div>
        <div class="btns">${xmlB}${mbB}</div>
      </div>`;

    if (hasMedia) {
      const img = card.querySelector('img');
      if (img) obs.observe(img);
    }

    card.querySelector('.thumb').addEventListener('click', () => openLB(p));
    frag.appendChild(card);
  });

  grid.appendChild(frag);
  anime({
    targets: grid.querySelectorAll('.card'),
    opacity: [0,1], translateY: [18,0],
    duration: 420, delay: anime.stagger(55, {start:40}),
    easing: 'easeOutExpo'
  });
}

/* ── SEARCH ── */
let st;
document.getElementById('q').addEventListener('input', () => { clearTimeout(st); st = setTimeout(render, 200); });

/* ── CATS ── */
document.getElementById('cats').addEventListener('click', e => {
  const btn = e.target.closest('.cat');
  if (!btn) return;
  document.querySelectorAll('.cat').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  activeCat = btn.dataset.c;
  render();
});

/* ── LOAD ── */
async function load() {
  try {
    const snap = await getDocs(query(collection(db,'presets'), orderBy('createdAt','desc')));
    presets = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    setCounts();
    render();
  } catch(e) {
    toast('Gagal memuat data', 'err');
  } finally {
    doneLoader();
  }
}

/* ── LOADER ANIM ── */
anime({ targets:'.ld-logo', opacity:[0,1], translateY:[16,0], duration:550, easing:'easeOutExpo' });
anime({ targets:'.ld-sub', opacity:[0,1], duration:400, delay:200, easing:'easeOutQuad' });

load();
</script>
</body>
</html>
